name: message-app-backend-v1

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: Set up JDK 17
    -name: Set up Node.js Environment
      uses: actions/setup-node@v2
      with:
        node-version: '20'
    -name: Install dependencies
      run: npm install
    -name: Run tests
      run: npm test
    - name: Build the application
      run: npm start

      